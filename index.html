<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RWAG Engine</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      margin: 0;
      padding: 15px;
      margin-left: auto;
      margin-right: auto;
    }

    #game {
      max-width: 600px;
      margin: auto;
    }

    .text {
      margin-bottom: 20px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .choice {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 12px;
      background: #222;
      border: 1px solid #444;
      color: #eee;
      cursor: pointer;
      font-size: 16px;
      text-align: left;
      border-radius: 6px;
    }

    .choice:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .choice:hover:not(:disabled) {
      background: #2a2a2a;
    }

    .scene-image {
      width: 100%;
      height: auto;

      display: block;

      border-radius: 12px;

      margin-bottom: 20px;

      object-fit: cover;
    }
  </style>
</head>

<body>

  <h1>RWAG Engine</h1>

  <div id="game">Načítám hru...</div>

  <!-- ICONS a UI (musí být před enginem) -->
  <script src="engine/ui.js"></script> 
  <script src="engine/icons.js"></script>
  
  <!-- ENGINE -->
  <script src="engine/engine.js"></script>

  <!-- SAFE START -->
  <script>
    window.addEventListener("load", () => {
      if (typeof start === "function") {
        start();
      } else {
        document.getElementById("game").innerHTML =
          "❌ Engine se nenačetl";
      }
    });
  </script>

</body>
</html>
