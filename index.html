<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RWAG Engine</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>RWAG Engine</title>

<link rel="stylesheet" href="css/engine.css">

</head>

<body>

  <h1>RWAG Engine</h1>

  <div id="status"></div>

  <div id="game">
      Načítám scénář...
  </div>

  <!-- ICONS a STATUS (musí být před enginem) -->
  <script src="engine/icons.js"></script>
  <script src="engine/status.js"></script>
  
  <!-- UI (musí být před enginem) -->
  <script src="engine/ui.js"></script>
    
  <!-- ENGINE -->
  <script src="engine/engine.js"></script>

  <!-- SAFE START -->
  <script>
  window.addEventListener("load", () => {

    if (typeof Engine !== "undefined") {

        Engine.start("nebakov");

    } else {

        document.getElementById("game").innerHTML =
            "❌ Engine se nenačetl";

    }

  });
  </script>

</body>
</html>
