<!doctype html>
<html lang="cs">
  
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RWAG Engine</title>
  <link rel="stylesheet" href="css/engine.css">
</head>

<body>
  <h1 id="appTitle">RWAG Engine</h1>

  <div id="topbar">
    <div id="status"></div>
  </div>
    <div id="menuPanel"></div>
  <div id="launcher"></div>
  <div id="game" style="display:none;"></div>

  <!-- SETTINGS, ICONS, STATUS, EFFECTS, ROLES, MENU (musí být před enginem) -->
  <script src="engine/icons.js"></script>
  <script src="engine/settings.js"></script>
  <script src="engine/status.js"></script>
  <script src="engine/effects.js"></script>
  <script src="engine/roles.js"></script>
  <script src="engine/menu.js"></script>
  
  <!-- UI (musí být před enginem) -->
  <script src="engine/ui.js"></script>
    
  <!-- ENGINE, LAUNCHER -->
  <script src="engine/engine.js"></script>
  <script src="engine/launcher.js"></script>

  <!-- SAFE START -->
  <script>
    window.addEventListener("load", () => {
      console.log("PAGE READY");
      Settings.load();
      Launcher.init();
      
    if(typeof Launcher !== "undefined"){
      Launcher.init();
    }
    else if(typeof Engine !== "undefined"){
      document.getElementById("game").style.display="block";
      Engine.start("nebakov");
    }
    });
  </script>
</body>
</html>
